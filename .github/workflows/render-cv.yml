name: Render CV

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-cv:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            pkg-config

      - name: Install Font Awesome 7 fonts
        run: |
          curl -L -o /tmp/fontawesome.zip \
            https://use.fontawesome.com/releases/v7.2.0/fontawesome-free-7.2.0-desktop.zip
          unzip -q /tmp/fontawesome.zip -d /tmp/fontawesome
          mkdir -p ~/.local/share/fonts
          find /tmp/fontawesome -type f \( -name '*.otf' -o -name '*.ttf' \) -exec cp {} ~/.local/share/fonts/ \;
          fc-cache -f -v

      - name: Restore R packages from renv
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Validate required secrets
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
        run: |
          if [ -z "$ZOTERO_API_KEY" ] || [ -z "$ZOTERO_USER_ID" ]; then
            echo "Missing ZOTERO_API_KEY or ZOTERO_USER_ID secret"
            exit 1
          fi

      - name: Render CV
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
        run: |
          quarto render cv.qmd

      - name: Check whether cv.pdf changed
        id: changed
        run: |
          if git diff --quiet -- cv.pdf; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated cv.pdf
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          git commit -m "chore: auto-render cv.pdf [skip cv render]"
          git push

      - name: Sync Nitta_CV.pdf to joelnitta-home
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone \
            https://x-access-token:${GH_PAT}@github.com/joelnitta/joelnitta-home.git \
            /tmp/joelnitta-home
          mkdir -p /tmp/joelnitta-home/content/pdf
          cp cv.pdf /tmp/joelnitta-home/content/pdf/Nitta_CV.pdf
          cd /tmp/joelnitta-home
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content/pdf/Nitta_CV.pdf; then
            echo "Nitta_CV.pdf unchanged, skipping commit"
          else
            git add content/pdf/Nitta_CV.pdf
            git commit -m "chore: update Nitta_CV.pdf from joelnitta-cv"
            git push
          fi
